<html>
  <body style="margin:0; overflow:hidden; background:black; font-family:Arial;">

    <img src="https://i.imgur.com/vHaAO5O.gif"
         style="position:fixed; width:100%; height:100%; object-fit:cover; z-index:-1;">

    <div style="
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%, -50%);
      color:white;
      text-align:center;
      text-shadow: 0 0 30px black;
    ">
      <h1 style="font-size:60px; margin:0;">🔥 AMOGUS AUF CRACK 🔥</h1>
      <p style="font-size:25px;">Willkommen… bereite dich auf Chaos vor 😄</p>
      <p id="tip" style="font-size:20px; margin-top:20px;">Lade Tipps…</p>
    </div>

    <audio id="music" autoplay loop>
      <source src="https://files.catbox.moe/wzzjmd.mp3" type="audio/mpeg">
    </audio>

    <script>
      const music = document.getElementById("music");

      // Setze ultraleise Lautstärke
      music.volume = 0.05;

      // Versuch automatisch abzuspielen, falls blockiert → starte nach Klick
      music.play().catch(() => {
        document.addEventListener("click", () => {
          music.volume = 0.05; // Lautstärke nochmal setzen
          music.play();
        });
      });

      // TTT-Tipps (ultra-cringe & witzig)
      const tipps = [
        "Tipp: Immer den Traitor schmeicheln, vielleicht vergisst er, dass du Innocent bist. 🔥",
        "Tipp: Werft zufällig aufeinanderfolgende Bananen – Chaos garantiert.",
        "Tipp: Wenn du einen Body siehst, tu so, als würdest du ihn streicheln – komplett harmlos!",
        "Tipp: Traitor? Einfach einen Zettel 'Ich bin unschuldig' ans Stirnband kleben.",
        "Tipp: Ducken = Ninja-Modus. Springen = Super-Ninja-Modus. Tanzen = ???",
        "Tipp: Bodyguards optional – verkleide dich als Stuhl, niemand verdächtigt dich.",
        "Tipp: Immer epischen Soundeffekt abspielen, wenn du jemanden tötest… selbst wenn unschuldig.",
        "Tipp: Unsichtbar? Nein, besser Glitzer-Mütze, alle denken Einhorn.",
        "Tipp: Bei jedem Schuss laut 'Pew Pew!' schreien – moralische Verwirrung deluxe.",
        "Tipp: Body gefunden? Sofort Selfie posten – Social Media First!",
        "Tipp: Schleichen funktioniert am besten, wenn du TikTok-Trends nachmachst.",
        "Tipp: Benutze jede Waffe nur, um Türen zu öffnen – epische Verwirrung garantiert.",
        "Tipp: Immer zufälligen Kuchen auf dem Kopf tragen – niemand überprüft Kuchen.",
        "Tipp: Vom Traitor gejagt? Spiel tot & sing Nationalhymne rückwärts.",
        "Tipp: Jeder Traitor fürchtet Spieler mit Gummiente – vertrau mir."
      ];

      let index = 0;
      const tipDiv = document.getElementById("tip");

      function changeTipp() {
        tipDiv.textContent = tipps[index];
        index = (index + 1) % tipps.length;
      }

      // Ersten Tipp direkt anzeigen
      changeTipp();

      // Alle 5 Sekunden wechseln
      setInterval(changeTipp, 5000);
    </script>

  </body>
</html>

<html>
  <body style="margin:0; overflow:hidden; background:black; font-family:Arial;">

    <!-- GIF-Hintergrund -->
    <img src="https://i.imgur.com/vHaAO5O.gif"
         style="position:fixed; width:100%; height:100%; object-fit:cover; z-index:-2;">

    <!-- Pulsierender Overlay-Hintergrund -->
    <div style="
      position:fixed; top:0; left:0; width:100%; height:100%;
      pointer-events:none;
      background: radial-gradient(circle, rgba(255,0,255,0.05), rgba(0,255,255,0.05));
      animation: pulseBG 4s infinite alternate;
      z-index:-1;
    "></div>

    <!-- Obere Texte: Servername & Willkommen -->
    <div style="
      position:absolute;
      top:20%;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
    ">
      <h1 id="title" style="
        font-size:70px; 
        margin:0; 
        font-weight:bold;
        color:#ff00ff;
        animation: colorPulse 3s infinite alternate;
      ">
        🔥 FeelsBadManZone 🔥
      </h1>
      <p id="welcome" style="
        font-size:32px; 
        margin-top:10px; 
        font-weight:bold;
        color:#ff00ff;
        animation: colorPulse 3s infinite alternate;
      ">
        Willkommen… bereite dich auf das TOTAL CHAOS vor 😄
      </p>
    </div>

    <!-- Tipps weiter unten -->
    <div style="
      position:absolute;
      top:80%;
      left:50%;
      transform:translateX(-50%);
      text-align:center;
    ">
      <p id="tip" style="font-size:22px; color:#00ffff; text-shadow:0 0 15px #00ffff;">
        Lade Tipps…
      </p>
    </div>

    <!-- Musik -->
    <audio id="music" autoplay loop>
      <source src="https://files.catbox.moe/wzzjmd.mp3" type="audio/mpeg">
    </audio>

    <audio id="tipSound">
      <source src="https://files.catbox.moe/83lkje.mp3" type="audio/mpeg">
    </audio>

    <style>
      /* Farben pulsieren */
      @keyframes colorPulse {
        0% { color:#ff00ff; }
        25% { color:#00ffff; }
        50% { color:#ffff00; }
        75% { color:#ff0000; }
        100% { color:#00ff00; }
      }

      /* Pulsierender Hintergrund */
      @keyframes pulseBG {
        0% { opacity:0.05; }
        50% { opacity:0.15; }
        100% { opacity:0.05; }
      }

      /* Tipp Aufblitzen + Shake */
      @keyframes tipFlash {
        0% { color:#00ffff; text-shadow:0 0 5px #00ffff; transform: scale(1); }
        50% { color:#ff00ff; text-shadow:0 0 20px #ff00ff; transform: scale(1.1); }
        100% { color:#00ffff; text-shadow:0 0 5px #00ffff; transform: scale(1); }
      }

      @keyframes tipShake {
        0% { transform: translateX(0); }
        25% { transform: translateX(-3px); }
        50% { transform: translateX(3px); }
        75% { transform: translateX(-3px); }
        100% { transform: translateX(0); }
      }

      /* Emotes fallen von oben */
      @keyframes emoteFall {
        0% { transform: translateY(-50px) scale(1); opacity:1; }
        100% { transform: translateY(110vh) scale(1.2); opacity:0; }
      }

      .emote {
        position:fixed;
        font-size:30px;
        pointer-events:none;
        z-index:9999;
        animation: emoteFall 6s linear forwards;
      }
    </style>

    <script>
      // Musik
      const music = document.getElementById("music");
      music.volume = 0.01;
      music.play().catch(() => {
        document.addEventListener("click", () => music.play());
      });

      // Tipp-Sound
      const tipSound = document.getElementById("tipSound");
      tipSound.volume = 0.003;

      // Tipps
      const tipps = [
        "Tipp: Immer den Traitor schmeicheln, vielleicht vergisst er, dass du Innocent bist. 🔥",
        "Tipp: Werft zufällig aufeinanderfolgende Bananen – Chaos garantiert.",
        "Tipp: Wenn du einen Body siehst, tu so, als würdest du ihn streicheln – komplett harmlos!",
        "Tipp: Traitor? Einfach einen Zettel 'Ich bin unschuldig' ans Stirnband kleben.",
        "Tipp: Ducken = Ninja-Modus. Springen = Super-Ninja-Modus. Tanzen = ???",
        "Tipp: Bodyguards optional – verkleide dich als Stuhl, niemand verdächtigt dich.",
        "Tipp: Immer epischen Soundeffekt abspielen, wenn du jemanden tötest… selbst wenn unschuldig.",
        "Tipp: Unsichtbar? Nein, besser Glitzer-Mütze, alle denken Einhorn.",
        "Tipp: Bei jedem Schuss laut 'Pew Pew!' schreien – moralische Verwirrung deluxe.",
        "Tipp: Body gefunden? Sofort Selfie posten – Social Media First!",
        "Tipp: Schleichen funktioniert am besten, wenn du TikTok-Trends nachmachst.",
        "Tipp: Benutze jede Waffe nur, um Türen zu öffnen – epische Verwirrung garantiert.",
        "Tipp: Immer zufälligen Kuchen auf dem Kopf tragen – niemand überprüft Kuchen.",
        "Tipp: Vom Traitor gejagt? Spiel tot & sing Nationalhymne rückwärts.",
        "Tipp: Jeder Traitor fürchtet Spieler mit Gummiente – vertrau mir."
      ];

      let index = 0;
      const tipDiv = document.getElementById("tip");

      function changeTipp() {
        tipDiv.textContent = tipps[index];
        tipDiv.style.animation = "tipFlash 0.5s, tipShake 0.2s";
        tipSound.currentTime = 0;
        tipSound.play();
        setTimeout(() => tipDiv.style.animation = "", 500);
        index = (index + 1) % tipps.length;
      }

      changeTipp();
      setInterval(changeTipp, 5000);

      // Emotes fallen zufällig
      const emotes = ["🔥","😄","💀","💥","🍌","🎉","✨","🪩","🎯","🥳"];
      function spawnEmote() {
        if (document.querySelectorAll(".emote").length > 10) return; // max 10 gleichzeitig
        const emote = document.createElement("div");
        emote.classList.add("emote");
        emote.textContent = emotes[Math.floor(Math.random()*emotes.length)];
        emote.style.left = Math.random() * 100 + "vw";
        emote.style.fontSize = 20 + Math.random()*20 + "px";
        document.body.appendChild(emote);
        setTimeout(() => emote.remove(), 6000);
      }

      setInterval(spawnEmote, 1000);
    </script>

  </body>
</html>
